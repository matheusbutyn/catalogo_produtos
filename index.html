<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="styles/style.css">
    <title>Meu Catálogo</title>
</head>
<body>
    <form id="formCadastro" onsubmit="fazerCadastro(event)">
        <header>
            <div class="titulo_head">
                <h1>CADASTRO DE PRODUTOS</h1>
            </div>
            <div class="img_head">
                <img src="images/list.png">
            </div>
        </header>
        <div class="barra_menu">
            <a href="#cadastro" onclick="trocarTela('cadastro')">CADASTRAR</a>
            <a href="#listar" onclick="trocarTela('listar')">LISTAR</a>
        </div>
        <div class="cadastro" id="cadastro">
            <div class="inserir">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Insira o nome do produto" required>
            </div>
            <div class="inserir">
                <label for="nome">Categoria</label>
                <input type="text" id="categoria" placeholder="Insira a categoria do produto" required>
            </div>
            <div class="inserir">
                <label for="nome">Descrição</label>
                <input type="text" id="descricao" placeholder="Insira a descrição do produto" required>
            </div>
            <div class="inserir">
                <label for="nome">Preço</label>
                <input type="number" id="preco" placeholder="Insira o preço do produto" min="0" required>
            </div>
            <button type="submit" class="novo_cad"><p>+ NOVO PRODUTO</p></button>
        </div>
        <div class="listar" id="listar" style="display: none;">
            <h2>Produtos Cadastrados</h2>
        </div>
    </form>
    <script src="scripts/script.js"></script>
</body>
</html>
